<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="note.svg" />
    <link rel="stylesheet" href="loading.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vapor</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 0;
      }

      #ui-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
      }

      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: black;
        color: white;
        font-size: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
      }

      .loader {
        animation: blink 1s infinite;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      .loader-vapor {
        animation: floatUpDown 3s ease-in-out infinite, fadeInOut 3s ease-in-out infinite;
        font-size: 24px;
        color: #ffb6c1;
        letter-spacing: 2px;
        font-family: 'Courier New', monospace;
        text-shadow: 0 0 10px #fff5, 0 0 20px #fff3;
      }

      @keyframes floatUpDown {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }

      @keyframes fadeInOut {
        0%, 100% { opacity: 0.9; }
        50% { opacity: 0.4; }
      }

      #progress-container {
        width: 60%;
        height: 10px;
        background-color: rgba(255, 255, 255, 0.2);
        border-radius: 5px;
        overflow: hidden;
        margin-top: 20px;
      }

      #progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #ff7e5f, #feb47b);
        transition: width 0.3s ease;
      }

      #app {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loader-vapor">Loading…</div>
      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>
    </div>

    <div id="app"></div>
    <div id="ui-layer">
      <aside id="musicspace-sidebar" class="is-open">
        <div id="audioControls"></div>
        <div id="musicspace-panels"></div>
      </aside>
      <button id="musicspace-sidebar-toggle" type="button" aria-expanded="true" aria-controls="musicspace-sidebar">Hide UI</button>
    </div>
    <audio id="audioPlayer" src=""></audio>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
