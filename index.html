<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="note.svg" />
    <link rel="stylesheet" href="loading.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vapor</title>
    <style>
      html,
      body {
        margin: 0;
        overflow: hidden;
        min-height: 100%;
        font-family: Arial, Helvetica, sans-serif;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 0;
      }

      #ui-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
      }

      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: black;
        color: white;
        font-size: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
      }

      .loader {
        animation: blink 1s infinite;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      .loader-vapor {
        animation: floatUpDown 3s ease-in-out infinite, fadeInOut 3s ease-in-out infinite;
        font-size: 24px;
        color: #ffb6c1;
        letter-spacing: 2px;
        font-family: 'Courier New', monospace;
        text-shadow: 0 0 10px #fff5, 0 0 20px #fff3;
      }

      @keyframes floatUpDown {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }

      @keyframes fadeInOut {
        0%, 100% { opacity: 0.9; }
        50% { opacity: 0.4; }
      }

      #progress-container {
        width: 60%;
        height: 10px;
        background-color: rgba(255, 255, 255, 0.2);
        border-radius: 5px;
        overflow: hidden;
        margin-top: 20px;
      }

      #progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #ff7e5f, #feb47b);
        transition: width 0.3s ease;
      }

      #app {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loader-vapor">Loading…</div>
      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>
    </div>

    <div id="app"></div>
    <div id="ui-layer">
      <aside id="musicspace-sidebar" class="is-open">
        <div id="musicspace-sidebar-shell">
          <div id="musicspace-sidebar-sticky">
            <a id="musicspace-sidebar-brand" href="https://www.somafm.com" target="_blank" rel="noreferrer noopener" aria-label="Visit SomaFM">
              <img src="/images/branding/sidepanelheader.png" alt="SomaFM" />
            </a>
            <nav id="musicspace-quick-nav" aria-label="Sidebar sections">
              <button type="button" class="musicspace-quick-nav-button" data-target="music-section">Music</button>
              <button type="button" class="musicspace-quick-nav-button" data-target="room-panel">Room</button>
              <button type="button" class="musicspace-quick-nav-button" data-target="participant-list">People</button>
              <button type="button" class="musicspace-quick-nav-button" data-target="chat-panel">Chat</button>
              <button type="button" class="musicspace-quick-nav-button" data-target="musicspace-advanced-group">Advanced</button>
            </nav>
          </div>
          <div id="musicspace-sidebar-scroll">
            <section id="music-section" class="musicspace-card musicspace-card--media musicspace-card--standalone">
              <div class="musicspace-card-header">
                <div class="musicspace-card-title-wrap">
                  <span class="musicspace-card-icon musicspace-card-icon--section" aria-hidden="true">
                    <svg viewBox="0 0 12.75 16.78" focusable="false">
                      <path d="M10.18,3.76c-1.51-1.2-2.75-2.26-3.11-2.89-.32-.56-.46-.87-1.18-.87-.49,0-.85.34-.85,1.34v10.12c-.49-.24-1.07-.38-1.68-.38-1.85,0-3.35,1.28-3.35,2.85s1.5,2.85,3.35,2.85,3.36-1.28,3.36-2.85v-7.66c.07-.71.42-.44.78-.2.73.48,1.23.62,2.39,1.33,1.27.78.97,2.84.11,3.62-.75.69-1.54,1.79-.21,1.23,1.36-.57,2.96-1.94,2.96-3.83,0-2.2-1.06-3.46-2.57-4.66Z" />
                      <path d="M3.35,16.63C1.53,16.63.05,15.39,0,13.85c0,.02,0,.05,0,.08,0,1.58,1.5,2.85,3.35,2.85s3.36-1.28,3.36-2.85v-.15c0,1.58-1.5,2.85-3.36,2.85ZM10.73,9.08c.03-.72-.21-1.44-.85-1.83-1.16-.71-1.66-.85-2.39-1.33-.36-.24-.71-.5-.78.2v.15c.07-.71.42-.44.78-.2.73.48,1.23.62,2.39,1.33.59.37.84,1.01.85,1.68ZM12.75,8.32c-.03,1.87-1.62,3.21-2.96,3.78-.44.19-.65.19-.7.08-.07.24.1.33.7.07,1.36-.57,2.96-1.94,2.96-3.83,0-.03,0-.06,0-.1Z" />
                    </svg>
                  </span>
                  <div>
                    <h2 class="musicspace-card-title">Music</h2>
                    <div class="musicspace-card-subtitle">Independent radio. Curated vibes. Pick a station and join the room.</div>
                  </div>
                </div>
              </div>
              <div id="audioControls"></div>
            </section>
            <section id="musicspace-session-status" class="musicspace-status-card">
              <div id="musicspace-session-indicator" class="musicspace-status-dot is-idle" aria-hidden="true"></div>
              <div class="musicspace-status-copy">
                <div id="musicspace-session-line-1" class="musicspace-status-line-1">Idle</div>
                <div id="musicspace-session-line-2" class="musicspace-status-line-2">No room selected</div>
              </div>
            </section>
            <div id="musicspace-primary-panels"></div>
            <section id="musicspace-advanced-group">
              <div class="musicspace-advanced-heading">Advanced</div>
              <div id="musicspace-advanced-panels"></div>
            </section>
          </div>
          <footer id="musicspace-sidebar-footer" aria-label="Sidebar footer">
            <div class="musicspace-sidebar-footer-links">
              <span>&copy;<a href="https://www.studio10b.com/" target="_blank" rel="noopener noreferrer" aria-label="Studio 10b website">Studio 10b LLC</a>. 2026. All rights reserved.</span>
              <a href="/privacy-policy.html" target="_blank" rel="noopener noreferrer" aria-label="Privacy policy">Privacy</a>
              <a href="/terms-of-service.html" target="_blank" rel="noopener noreferrer" aria-label="Terms of service">Terms</a>
            </div>
          </footer>
        </div>
      </aside>
      <button id="musicspace-sidebar-toggle" type="button" aria-expanded="true" aria-controls="musicspace-sidebar">Hide</button>
    </div>
    <audio id="audioPlayer" src=""></audio>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
